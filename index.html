<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hangman</title>
    <link rel="stylesheet" href="./style.css" />
    <script type="module" src="./app.js" defer></script>
</head>
<body>
    <header class="header">
        <h1 class="header__main-heading">Hangman</h1>
    </header>
    <main class="game-container">
        <section class="scores">
            <h2 class="scores__title">Wins: <span class="scores__title--win">0</span></h2>
            <h2 class="scores__title scores__title--lose">Losses: <span class="scores__title--loss">0</span></h2>
        </section>
        <button class="btn hidden">Play Again</button>
        <section class="game-finished"></section>
        <figure class="diagram">
            <img id="img-0" src="./assets/imgs/h-0.jpg" alt="hangman-image-start" />
            <img id="img-1" src="./assets/imgs/h-1.jpg" alt="hangman image 1 life lost" class="hidden" />
            <img id="img-2" src="./assets/imgs/h-2.jpg" alt="hangman image 2 lives lost" class="hidden" />
            <img id="img-3" src="./assets/imgs/h-3.jpg" alt="hangman image 3 lives lost" class="hidden" />
            <img id="img-4" src="./assets/imgs/h-4.jpg" alt="hangman image 4 lives lost" class="hidden" />
            <img id="img-5" src="./assets/imgs/h-5.jpg" alt="hangman image 5 lives lost" class="hidden" />
            <img id="img-6" src="./assets/imgs/h-6.jpg" alt="hangman image 6 lives lost" class="hidden" />
            <img id="img-7" src="./assets/imgs/h-7.jpg" alt="hangman image 7 lives lost" class="hidden" />
            <img id="img-8" src="./assets/imgs/h-8.jpg" alt="hangman image 8 lives lost" class="hidden" />
            <img id="img-9" src="./assets/imgs/h-9.jpg" alt="hangman image 9 lives lost" class="hidden" />
            <img id="img-10" src="./assets/imgs/h-10.jpg" alt="hangman image game lost" class="hidden" />
        </figure>
        <section class="hangman-word">
            <h2 class="hangman-word__header"></h2>
        </section>
        <menu class="keys"></menu>
    </main>
</body>
</html>
